services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cost_tracking_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the separate "litellm" database on first volume init.
      # For an existing volume, run:
      #   docker compose exec postgres psql -U postgres -c "CREATE DATABASE litellm;"
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d cost_tracking_ai -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      # LiteLLM keeps its internal tables in a dedicated "litellm" database so
      # Prisma (which manages cost_tracking_ai) never sees or drops them.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-openai-placeholder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder}
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
